<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Módulo de Devoluciones - POS Kitsune</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
    .container { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { color: #333; margin-top: 0; }
    form { display: flex; flex-direction: column; }
    label { margin-top: 10px; font-weight: bold; color: #555; }
    input { padding: 12px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
    button { padding: 12px; background: #1976d2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
    button:hover { background: #125a9c; }
    .back-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #1976d2; font-weight: bold; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="back-link">⬅ Volver al Inicio</a>
    
    <h2>🔄 Devoluciones</h2>
    <p>Ingresa los datos para reintegrar stock al inventario.</p>

    <form id="formDevolucion">
      <label for="productoId">ID del Producto:</label>
      <input type="text" id="productoId" placeholder="Ej: 101" required>

      <label for="cantidad">Cantidad a devolver:</label>
      <input type="number" id="cantidad" min="1" value="1" required>

      <button type="submit">Registrar Devolución</button>
    </form>
  </div>

  <script>
    document.getElementById("formDevolucion").addEventListener("submit", async e => {
      e.preventDefault();

      const productoId = document.getElementById("productoId").value;
      const cantidad = document.getElementById("cantidad").value;

      try {
        const res = await fetch("/devoluciones", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: 'include', // <--- Replicado de Ventas
          body: JSON.stringify({ 
            productoId: productoId, 
            cantidad: parseInt(cantidad) 
          })
        });

        // Manejo de sesión igual que en Ventas
        if (res.status === 403) {
            alert('Sesión no válida. Por favor inicia sesión.');
            window.location.href = "login.html";
            return;
        }

        const data = await res.json();

        if (data.error === false) {
          const info = data.body;
          alert(`✅ Éxito: ${info.mensaje}\nID: ${info.productoId}\nCantidad: ${info.cantidad}`);
          document.getElementById("formDevolucion").reset();
        } else {
          alert("❌ Error: " + (data.body || "No se pudo procesar la devolución"));
        }
      } catch (err) {
        console.error("Error en el fetch:", err);
        alert("Error de conexión con el servidor");
      }
    });
  </script>
</body>
</html>
