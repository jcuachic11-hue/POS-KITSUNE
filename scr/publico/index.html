        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { padding: 20px; border: 1px solid #ddd; border-radius: 8px; text-align: center; text-decoration: none; color: #333; transition: 0.3s; }
        .card:hover { background: #e3f2fd; border-color: #2196f3; }
        .card h3 { margin: 10px 0; }
        button { cursor: pointer; padding: 8px 16px; background: #ff4444; color: white; border: none; border-radius: 4px; }
    </style>
</head>

    <div class="menu-grid">

        <a href="usuarios.html" class="card"><h3>👥 Usuarios</h3><p>Control de accesos</p></a>
        <a href="ventas.html" class="card"><h3>💰 Ventas</h3><p>Caja y Carrito</p></a>
        <a href="devoluciones.html" class="card"><h3>🔄 Devoluciones</h3><p>Reingreso de stock</p></a>
