<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - POS Kitsune</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
    .login-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #218838; }

    /* ========================================== */
    /* SECCIÓN DE PURO CAPTCHA - ESTILOS (INICIO) */
    /* ========================================== */
    #captcha-container { text-align: center; margin-bottom: 10px; }
    #captcha-img { cursor: pointer; background: #eee; border-radius: 4px; display: block; margin-bottom: 5px; }
    #captcha-img svg { width: 100%; height: auto; border-radius: 4px; }
    /* ========================================== */
    /* SECCIÓN DE PURO CAPTCHA - ESTILOS (FIN)    */
    /* ========================================== */
  </style>
</head>
<body>
  <div class="login-card">
    <h2 style="text-align: center;">Iniciar Sesión</h2>
    <form id="loginForm">
      <label>Usuario:</label>
      <input type="text" id="usuario" required>
      <label>Contraseña:</label>
      <input type="password" id="password" required>

      <div id="captcha-container">
        <div id="captcha-img" title="Clic para recargar">
            </div>
        <input type="text" id="captchaInput" placeholder="Código de la imagen" required>
      </div>
      <button type="submit">Entrar</button>
    </form>
  </div>

  <script>


    // ========================================== 
    
    async function cargarCaptcha() {
      try {
        const res = await fetch("/login/captcha"); // Ajusta a tu ruta de express
        const svg = await res.text();
        document.getElementById('captcha-img').innerHTML = svg;
      } catch (err) {
        console.error("Error al cargar captcha");
      }
    }

    document.addEventListener('DOMContentLoaded', cargarCaptcha);
    document.getElementById('captcha-img').onclick = cargarCaptcha;
    // ========================================== 


    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const usuario = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;
      
      // Capturamos el valor del captcha
      const captchaInput = document.getElementById('captchaInput').value;

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          // Enviamos el captchaInput junto con las credenciales
          body: JSON.stringify({ usuario, password, captchaInput })
        });

        const data = await res.json();
        const token = data.body?.token || data.token;

        if (!data.error && token) {
          localStorage.setItem("token", token);
          localStorage.setItem("usuario", usuario); 
          window.location.href = "index.html"; 
        } else {
          alert("❌ Error: " + (data.body || "Credenciales incorrectas"));
          cargarCaptcha(); // Recargar si falla
        }
      } catch (err) {
        alert("Error de conexión con el servidor");
      }
    });
  </script>
</body>
</html>
