<script>
    const API_URL = '/productos';
    // Nota: El token se envía pero el backend ahora lo ignora (comentado allá)
    const token = localStorage.getItem('token');

    // --- CARGAR PRODUCTOS ---
    async function cargarProductos() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            const listaProductos = data.body || []; 
            
            const tbody = document.querySelector('#productosTable tbody');
            tbody.innerHTML = '';
            
            listaProductos.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.nombre}</td>
                        <td>${p.descripcion || ''}</td>
                        <td>$${p.precio}</td>
                        <td>${p.stock}</td>
                        <td>${p.categoria || ''}</td>
                        <td>
                            <button onclick="prepararEdicion(${p.id}, '${p.nombre}', '${p.descripcion || ''}', ${p.precio}, ${p.stock}, '${p.categoria || ''}')">Editar</button>
                            <button class="btn-eliminar" onclick="eliminarProducto(${p.id}, '${p.nombre}')">Eliminar</button>
                        </td>
                    </tr>`;
            });
        } catch (err) {
            console.error("Error al cargar:", err);
        }
    }

    // --- GUARDAR O ACTUALIZAR ---
    document.getElementById('productoForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const id = document.getElementById('id').value;
        const producto = {
            nombre: document.getElementById('nombre').value,
            descripcion: document.getElementById('descripcion').value,
            precio: parseFloat(document.getElementById('precio').value),
            stock: parseInt(document.getElementById('stock').value),
            categoria: document.getElementById('categoria').value
        };

        // TODO va a /agregar vía POST. 
        // Si lleva ID, el backend hace UPDATE automáticamente.
        try {
            const res = await fetch(`${API_URL}/agregar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(id ? { ...producto, id: parseInt(id) } : producto)
            });

            if (res.ok) {
                alert(id ? "Producto actualizado" : "Producto agregado");
                limpiarFormulario();
                cargarProductos();
            } else {
                alert("Error en el servidor");
            }
        } catch (err) {
            console.error("Error al guardar:", err);
        }
    });

    // --- ELIMINAR ---
    async function eliminarProducto(id, nombre) {
        if (!confirm(`¿Deseas realmente eliminar ${nombre}?`)) return;

        try {
            const res = await fetch(`${API_URL}/eliminar`, {
                method: 'DELETE', // Coincide con el backend
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });

            if (res.ok) {
                alert('Producto eliminado correctamente');
                cargarProductos();
            } else {
                alert('Error al intentar eliminar');
            }
        } catch (err) {
            console.error("Error al eliminar:", err);
        }
    }

    function prepararEdicion(id, nombre, desc, precio, stock, cat) {
        document.getElementById('id').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('descripcion').value = desc;
        document.getElementById('precio').value = precio;
        document.getElementById('stock').value = stock;
        document.getElementById('categoria').value = cat;
        window.scrollTo(0, 0);
    }

    function limpiarFormulario() {
        document.getElementById('productoForm').reset();
        document.getElementById('id').value = '';
    }

    window.addEventListener("pageshow", cargarProductos);
    cargarProductos();
</script>
