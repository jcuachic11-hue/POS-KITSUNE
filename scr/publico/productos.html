<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos - POS Kitsune</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        form { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; display: inline-block; }
        input, textarea { display: block; margin-bottom: 10px; width: 300px; padding: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f4f4f4; }
        button { cursor: pointer; padding: 5px 10px; }
        .btn-guardar { background-color: #28a745; color: white; border: none; }
        .btn-eliminar { background-color: #dc3545; color: white; border: none; }
    </style>
</head>
<body>

    <h1>🦊 Gestión de Productos - POS Kitsune</h1>

    <form id="productoForm">
        <h3>Agregar / Editar Producto</h3>
        <input type="hidden" id="id">
        
        <label>Nombre:</label>
        <input type="text" id="nombre" placeholder="Nombre del producto" required>
        
        <label>Descripción:</label>
        <textarea id="descripcion" placeholder="Breve descripción"></textarea>
        
        <label>Precio:</label>
        <input type="number" id="precio" step="0.01" placeholder="0.00" required>
        
        <label>Stock:</label>
        <input type="number" id="stock" placeholder="Cantidad disponible" required>
        
        <label>Categoría:</label>
        <input type="text" id="categoria" placeholder="Ej: Bebidas, Alimentos">
        
        <button type="submit" class="btn-guardar">Guardar Producto</button>
        <button type="button" onclick="limpiarFormulario()">Cancelar</button>
    </form>

    <hr>

    <table id="productosTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        const API_URL = '/productos';
        const token = localStorage.getItem('token');

        // --- CARGAR PRODUCTOS (GET) ---
        async function cargarProductos() {
            try {
                const res = await fetch(API_URL, { 
                    headers: { 'Authorization': 'Bearer ' + token } 
                });
                
                if (!res.ok) {
                    console.warn("No se pudo obtener la lista de productos.");
                    return;
                }

                const data = await res.json();
                const listaProductos = data.body || []; 
                
                const tbody = document.querySelector('#productosTable tbody');
                tbody.innerHTML = '';
                
                listaProductos.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${p.id}</td>
                            <td>${p.nombre}</td>
                            <td>${p.descripcion || ''}</td>
                            <td>$${p.precio}</td>
                            <td>${p.stock}</td>
                            <td>${p.categoria || ''}</td>
                            <td>
                                <button onclick="prepararEdicion(${p.id}, '${p.nombre}', '${p.descripcion || ''}', ${p.precio}, ${p.stock}, '${p.categoria || ''}')">Editar</button>
                                <button class="btn-eliminar" onclick="eliminarProducto(${p.id}, '${p.nombre}')">Eliminar</button>
                            </td>
                        </tr>`;
                });
            } catch (err) {
                console.error("Error en la petición de carga:", err);
            }
        }

        // --- GUARDAR O ACTUALIZAR (POST / PUT) ---
        document.getElementById('productoForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('id').value;
            const producto = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value,
                precio: parseFloat(document.getElementById('precio').value),
                stock: parseInt(document.getElementById('stock').value),
                categoria: document.getElementById('categoria').value
            };

            // Si hay ID usamos la ruta de eliminar/inactivar o editar según tu backend
            // Usaremos /agregar para nuevos y asumiremos que tu lógica de "eliminar" recibe el ID para actualizar estado
            const url = id ? `${API_URL}/eliminar` : `${API_URL}/agregar`;
            const metodo = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: metodo,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token 
                    },
                    body: JSON.stringify(id ? { ...producto, id: parseInt(id) } : producto)
                });

                if (res.ok) {
                    alert(id ? "Producto actualizado" : "Producto agregado");
                    limpiarFormulario();
                    cargarProductos();
                } else {
                    alert("Error al procesar la solicitud en el servidor");
                }
            } catch (err) {
                console.error("Error al guardar:", err);
                alert("Error de conexión");
            }
        });

        // --- ELIMINAR (PUT/DELETE según tu backend) ---
        async function eliminarProducto(id, nombre) {
            if (!confirm(`¿Deseas eliminar ${nombre}?`)) return;

            try {
                const res = await fetch(`${API_URL}/eliminar`, {
                    method: 'PUT', // Tu código de backend usa PUT para "eliminar" (cambiar estado)
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token 
                    },
                    body: JSON.stringify({ id: id })
                });

                if (res.ok) {
                    cargarProductos();
                }
            } catch (err) {
                console.error("Error al eliminar:", err);
            }
        }

        // --- UTILIDADES ---
        function prepararEdicion(id, nombre, desc, precio, stock, cat) {
            document.getElementById('id').value = id;
            document.getElementById('nombre').value = nombre;
            document.getElementById('descripcion').value = desc;
            document.getElementById('precio').value = precio;
            document.getElementById('stock').value = stock;
            document.getElementById('categoria').value = cat;
            window.scrollTo(0, 0);
        }

        function limpiarFormulario() {
            document.getElementById('productoForm').reset();
            document.getElementById('id').value = '';
        }

        // Ejecutar al cargar la página
        window.addEventListener("pageshow", cargarProductos);
        cargarProductos();
    </script>
</body>
</html>
