  <script>
    const API_URL = '/productos';
    const token = localStorage.getItem('token');

    // Protección: Si no hay token, mandarlo al login de una vez
   // if (!token) {
      //alert("Sesión expirada. Por favor inicia sesión.");
      //window.location.href = "login.html";
  //  }

    async function cargarProductos() {
      if (!token) return;
      try {
        const res = await fetch(API_URL, { 
          headers: { Authorization: 'Bearer ' + token } 
        });
        const data = await res.json();
        
        // 💡 CORRECCIÓN: Accedemos a data.body que es donde está tu array de productos
        const listaProductos = data.body || []; 
        
        const tbody = document.querySelector('#productosTable tbody');
        tbody.innerHTML = '';
        
        listaProductos.forEach(p => {
          tbody.innerHTML += `
            <tr>
              <td>${p.id}</td>
              <td>${p.nombre}</td>
              <td>${p.descripcion}</td>
              <td>${p.precio}</td>
              <td>${p.stock}</td>
              <td>${p.categoria}</td>
              <td>
                <button onclick="editarProducto(${p.id}, \`${p.nombre}\`, \`${p.descripcion}\`, ${p.precio}, ${p.stock}, \`${p.categoria}\`)">Editar</button>
                <button onclick="eliminarProducto(${p.id}, \`${p.nombre}\`)">Eliminar</button>
              </td>
            </tr>`;
        });
      } catch (err) {
        console.error("Error cargando productos:", err);
      }
    }

    document.getElementById('productoForm').addEventListener('submit', async e => {
      e.preventDefault();
      
      const id = document.getElementById('id').value;
      const productoData = {
        nombre: document.getElementById('nombre').value,
        descripcion: document.getElementById('descripcion').value,
        precio: document.getElementById('precio').value,
        stock: document.getElementById('stock').value,
        categoria: document.getElementById('categoria').value
      };

      const method = id ? 'PUT' : 'POST';
      // Si es PUT, enviamos el ID en la URL según el estándar REST
      const url = id ? `${API_URL}/${id}` : API_URL;

      try {
        const res = await fetch(url, {
          method,
          headers: { 
            'Content-Type': 'application/json', 
            Authorization: 'Bearer ' + token 
          },
          body: JSON.stringify(productoData)
        });

        const result = await res.json();
        
        if (!result.error) {
          alert("Producto guardado correctamente");
          document.getElementById('productoForm').reset();
          document.getElementById('id').value = '';
          cargarProductos();
        } else {
          alert("Error: " + result.body);
        }
      } catch (err) {
        alert("Error al guardar producto");
      }
    });

    async function eliminarProducto(id, nombre) {
      if (!confirm(`¿Seguro que quieres eliminar "${nombre}"?`)) return;
      
      try {
        const res = await fetch(`${API_URL}/${id}`, {
          method: 'DELETE',
          headers: { Authorization: 'Bearer ' + token }
        });
        const result = await res.json();
        if (!result.error) cargarProductos();
      } catch (err) {
        alert("Error al eliminar");
      }
    }

    function editarProducto(id, nombre, descripcion, precio, stock, categoria) {
      document.getElementById('id').value = id;
      document.getElementById('nombre').value = nombre;
      document.getElementById('descripcion').value = descripcion;
      document.getElementById('precio').value = precio;
      document.getElementById('stock').value = stock;
      document.getElementById('categoria').value = categoria;
      // Scroll hacia el formulario para comodidad del usuario
      document.getElementById('productoForm').scrollIntoView({ behavior: 'smooth' });
    }

    window.addEventListener("pageshow", cargarProductos);
    cargarProductos();
  </script>
