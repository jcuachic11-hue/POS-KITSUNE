<script>
    // Usamos la ruta relativa directa. 
    // Si tu index.js dice app.use('/productos', ...), esta ruta es la correcta.
    const API_URL = '/productos';
    const token = localStorage.getItem('token');

    // --- CARGAR PRODUCTOS ---
    async function cargarProductos() {
        try {
            // Quitamos el Bearer Token momentáneamente para asegurar que cargue
            const res = await fetch(API_URL);
            
            if (!res.ok) {
                console.error("Error al obtener productos:", res.status);
                return;
            }

            const data = await res.json();
            // Accedemos a data.body porque tu respuestas.success lo envuelve así
            const listaProductos = data.body || []; 
            
            const tbody = document.querySelector('#productosTable tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            
            if (listaProductos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No hay productos en la base de datos.</td></tr>';
                return;
            }

            listaProductos.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.nombre}</td>
                        <td>${p.descripcion || ''}</td>
                        <td>$${p.precio}</td>
                        <td>${p.stock}</td>
                        <td>${p.categoria || ''}</td>
                        <td>
                            <button onclick="prepararEdicion(${p.id}, '${p.nombre}', '${p.descripcion || ''}', ${p.precio}, ${p.stock}, '${p.categoria || ''}')">Editar</button>
                            <button class="btn-eliminar" onclick="eliminarProducto(${p.id}, '${p.nombre}')">Eliminar</button>
                        </td>
                    </tr>`;
            });
        } catch (err) {
            console.error("Error de conexión:", err);
        }
    }

    // --- GUARDAR O ACTUALIZAR ---
    document.getElementById('productoForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const id = document.getElementById('id').value;
        const producto = {
            nombre: document.getElementById('nombre').value,
            descripcion: document.getElementById('descripcion').value,
            precio: parseFloat(document.getElementById('precio').value),
            stock: parseInt(document.getElementById('stock').value),
            categoria: document.getElementById('categoria').value
        };

        try {
            // IMPORTANTE: Enviamos a /productos/agregar
            const res = await fetch(`${API_URL}/agregar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(id ? { ...producto, id: parseInt(id) } : producto)
            });

            if (res.ok) {
                alert(id ? "Actualizado" : "Guardado");
                limpiarFormulario();
                cargarProductos();
            } else {
                alert("Error en el servidor al guardar");
            }
        } catch (err) {
            console.error("Error:", err);
        }
    });

    // --- ELIMINAR ---
    async function eliminarProducto(id, nombre) {
        if (!confirm(`¿Eliminar ${nombre}?`)) return;

        try {
            // IMPORTANTE: Enviamos a /productos/eliminar con método DELETE
            const res = await fetch(`${API_URL}/eliminar`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });

            if (res.ok) {
                alert('Eliminado');
                cargarProductos();
            }
        } catch (err) {
            console.error("Error:", err);
        }
    }

    function prepararEdicion(id, nombre, desc, precio, stock, cat) {
        document.getElementById('id').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('descripcion').value = desc;
        document.getElementById('precio').value = precio;
        document.getElementById('stock').value = stock;
        document.getElementById('categoria').value = cat;
        window.scrollTo(0,0);
    }

    function limpiarFormulario() {
        document.getElementById('productoForm').reset();
        document.getElementById('id').value = '';
    }

    // Ejecutar al cargar
    window.onload = cargarProductos;
</script>
