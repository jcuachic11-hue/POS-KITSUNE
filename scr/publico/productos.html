<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos - POS Kitsune</title>
    </head>
<body>

    <h1>Gestión de Productos</h1>

    <form id="productoForm">
        <input type="hidden" id="id">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <textarea id="descripcion" placeholder="Descripción"></textarea>
        <input type="number" id="precio" placeholder="Precio" required>
        <input type="number" id="stock" placeholder="Stock" required>
        <input type="text" id="categoria" placeholder="Categoría">
        <button type="submit">Guardar Producto</button>
    </form>

    <hr>

    <table id="productosTable" border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        const API_URL = '/productos';
        const token = localStorage.getItem('token');

        // 🛡️ COMENTADO PARA QUE NO TE MANDE AL LOGIN NI TE DIGA "SESIÓN EXPIRADA"
        /*
        if (!token) {
          alert("Sesión expirada. Por favor inicia sesión.");
          window.location.href = "login.html";
        }
        */

        async function cargarProductos() {
          // También comentamos esto para que intente cargar aunque no haya login
          // if (!token) return; 

          try {
            const res = await fetch(API_URL, { 
              headers: { Authorization: 'Bearer ' + token } 
            });
            
            // Si no hay DB, simplemente imprimimos en consola y no rompemos la página
            if (!res.ok) return console.warn("Esperando conexión a base de datos...");

            const data = await res.json();
            const listaProductos = data.body || []; 
            
            const tbody = document.querySelector('#productosTable tbody');
            tbody.innerHTML = '';
            
            listaProductos.forEach(p => {
              tbody.innerHTML += `
                <tr>
                  <td>${p.id}</td>
                  <td>${p.nombre}</td>
                  <td>${p.descripcion}</td>
                  <td>${p.precio}</td>
                  <td>${p.stock}</td>
                  <td>${p.categoria}</td>
                  <td>
                    <button onclick="editarProducto(${p.id}, \`${p.nombre}\`, \`${p.descripcion}\`, ${p.precio}, ${p.stock}, \`${p.categoria}\`)">Editar</button>
                    <button onclick="eliminarProducto(${p.id}, \`${p.nombre}\`)">Eliminar</button>
                  </td>
                </tr>`;
            });
          } catch (err) {
            console.error("Error cargando productos:", err);
          }
        }

        window.addEventListener("pageshow", cargarProductos);
        cargarProductos();
    </script>
</body>
</html>
