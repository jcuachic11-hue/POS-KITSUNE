<script>
 
    const API_URL = window.location.origin + '/productos';
    
    const token = localStorage.getItem('token');

    // --- CARGAR PRODUCTOS ---
    async function cargarProductos() {
        console.log("Intentando cargar productos desde:", API_URL);
        try {
            const res = await fetch(API_URL);
            
            if (!res.ok) {
                console.error("Error en respuesta del servidor:", res.status);
                return;
            }

            const data = await res.json();
            // Validamos que data.body exista (estructura estándar de tu proyecto)
            const listaProductos = data.body || []; 
            
            const tbody = document.querySelector('#productosTable tbody');
            if (!tbody) return;
            
            tbody.innerHTML = '';
            
            if (listaProductos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No hay productos registrados</td></tr>';
                return;
            }

            listaProductos.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.nombre}</td>
                        <td>${p.descripcion || ''}</td>
                        <td>$${p.precio}</td>
                        <td>${p.stock}</td>
                        <td>${p.categoria || ''}</td>
                        <td>
                            <button onclick="prepararEdicion(${p.id}, '${p.nombre}', '${p.descripcion || ''}', ${p.precio}, ${p.stock}, '${p.categoria || ''}')">Editar</button>
                            <button class="btn-eliminar" onclick="eliminarProducto(${p.id}, '${p.nombre}')">Eliminar</button>
                        </td>
                    </tr>`;
            });
        } catch (err) {
            console.error("Error al cargar productos:", err);
        }
    }

    // --- GUARDAR O ACTUALIZAR ---
    document.getElementById('productoForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const id = document.getElementById('id').value;
        const producto = {
            nombre: document.getElementById('nombre').value,
            descripcion: document.getElementById('descripcion').value,
            precio: parseFloat(document.getElementById('precio').value),
            stock: parseInt(document.getElementById('stock').value),
            categoria: document.getElementById('categoria').value
        };

        try {
            // URL corregida para evitar doble diagonal
            const res = await fetch(`${API_URL}/agregar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(id ? { ...producto, id: parseInt(id) } : producto)
            });

            if (res.ok) {
                alert(id ? "✅ Producto actualizado" : "✅ Producto agregado");
                limpiarFormulario();
                await cargarProductos(); // Forzamos recarga
            } else {
                const errorData = await res.json();
                alert("❌ Error: " + (errorData.body || "Error en el servidor"));
            }
        } catch (err) {
            console.error("Error al guardar:", err);
            alert("❌ Error de conexión");
        }
    });

    // --- ELIMINAR ---
    async function eliminarProducto(id, nombre) {
        if (!confirm(`¿Realmente deseas eliminar "${nombre}"?`)) return;

        try {
            const res = await fetch(`${API_URL}/eliminar`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });

            if (res.ok) {
                alert('🗑️ Producto eliminado');
                await cargarProductos();
            } else {
                alert('❌ No se pudo eliminar el producto');
            }
        } catch (err) {
            console.error("Error al eliminar:", err);
        }
    }

    function prepararEdicion(id, nombre, desc, precio, stock, cat) {
        document.getElementById('id').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('descripcion').value = desc;
        document.getElementById('precio').value = precio;
        document.getElementById('stock').value = stock;
        document.getElementById('categoria').value = cat;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
