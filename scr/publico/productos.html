<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos - POS Kitsune</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f9f9f9; }
        h1 { color: #333; }
        form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; display: inline-block; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, textarea { display: block; margin-bottom: 10px; width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f4f4f4; }
        button { cursor: pointer; padding: 8px 12px; border-radius: 4px; font-weight: bold; border: none; margin-right: 5px; }
        .btn-guardar { background-color: #28a745; color: white; }
        .btn-eliminar { background-color: #dc3545; color: white; }
        .btn-limpiar { background-color: #6c757d; color: white; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px;">
    <a href="index.html" style="
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        background-color: #34495e;
        color: white;
        padding: 10px 15px;
        border-radius: 6px;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 14px;
        transition: background 0.3s;
    " onmouseover="this.style.backgroundColor='#2c3e50'" 
       onmouseout="this.style.backgroundColor='#34495e'">
        <span style="margin-right: 8px;"></span> Menú Principal
    </a>
</div>

    <h1> Gestión de Productos - POS Kitsune</h1>

    <form id="productoForm">
        <h3>Agregar / Editar Producto</h3>
        <input type="hidden" id="id">
        
        <label>Nombre:</label>
        <input type="text" id="nombre" placeholder="Nombre del producto" required>
        
        <label>Descripción:</label>
        <textarea id="descripcion" placeholder="Breve descripción"></textarea>
        
        <label>Precio:</label>
        <input type="number" id="precio" step="0.01" placeholder="0.00" required>
        
        <label>Stock:</label>
        <input type="number" id="stock" placeholder="Cantidad disponible" required>
        
        <label>Categoría:</label>
        <input type="text" id="categoria" placeholder="Ej: Bebidas, Alimentos">
        
        <button type="submit" class="btn-guardar">Guardar Producto</button>
        <button type="button" class="btn-limpiar" onclick="limpiarFormulario()">Cancelar / Limpiar</button>
    </form>

    <hr>

    <table id="productosTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const API_URL = '/productos';

        async function cargarProductos() {
            try {
                const res = await fetch(API_URL, { credentials: 'include' });
                
                if (res.status === 403) {
                    window.location.href = "login.html";
                    return;
                }

                const data = await res.json();
                const listaProductos = data.body || []; 
                const tbody = document.querySelector('#productosTable tbody');
                tbody.innerHTML = '';
                
                if (listaProductos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No hay productos registrados.</td></tr>';
                    return;
                }

                listaProductos.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${p.id}</td>
                            <td>${p.nombre}</td>
                            <td>${p.descripcion || ''}</td>
                            <td>$${parseFloat(p.precio).toFixed(2)}</td>
                            <td>${p.stock}</td>
                            <td>${p.categoria || ''}</td>
                            <td>
                                <button onclick="prepararEdicion(${p.id}, '${p.nombre}', '${p.descripcion || ''}', ${p.precio}, ${p.stock}, '${p.categoria || ''}')">Editar</button>
                                <button class="btn-eliminar" onclick="eliminarProducto(${p.id}, '${p.nombre}')">Eliminar</button>
                            </td>
                        </tr>`;
                });
            } catch (err) {
                console.error("Error al cargar productos:", err);
            }
        }

        document.getElementById('productoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('id').value;
            const producto = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value,
                precio: parseFloat(document.getElementById('precio').value),
                stock: parseInt(document.getElementById('stock').value),
                categoria: document.getElementById('categoria').value
            };

            try {
                const res = await fetch(`${API_URL}/agregar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(id ? { ...producto, id: parseInt(id) } : producto)
                });

                if (res.status === 403) {
                    alert("Sesión expirada");
                    window.location.href = "login.html";
                    return;
                }

                if (res.ok) {
                    alert(id ? "Producto actualizado correctamente" : "Producto agregado con éxito");
                    limpiarFormulario();
                    cargarProductos();
                } else {
                    alert("Error al procesar en el servidor");
                }
            } catch (err) {
                console.error("Error al guardar:", err);
            }
        });

        async function eliminarProducto(id, nombre) {
            if (!confirm(`¿Estás seguro de que deseas eliminar "${nombre}"?`)) return;
            try {
                const res = await fetch(`${API_URL}/eliminar`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ id: id })
                });

                if (res.status === 403) {
                    alert("No tienes permiso");
                    return;
                }

                if (res.ok) {
                    alert('🗑️ Producto eliminado correctamente');
                    cargarProductos();
                } else {
                    alert('No se pudo eliminar el producto');
                }
            } catch (err) {
                console.error("Error al eliminar:", err);
            }
        }

        function prepararEdicion(id, nombre, desc, precio, stock, cat) {
            document.getElementById('id').value = id;
            document.getElementById('nombre').value = nombre;
            document.getElementById('descripcion').value = desc;
            document.getElementById('precio').value = precio;
            document.getElementById('stock').value = stock;
            document.getElementById('categoria').value = cat;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function limpiarFormulario() {
            document.getElementById('productoForm').reset();
            document.getElementById('id').value = '';
        }

        window.onload = cargarProductos;
    </script>
</body>
</html>
