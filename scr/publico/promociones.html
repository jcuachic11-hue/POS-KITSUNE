<div class="container">
    <h2 id="tituloForm">Nueva Promoción</h2>
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="codigo" placeholder="Código">
    <input type="number" id="valor" placeholder="Porcentaje %">
    <button id="btnGuardar" onclick="guardarPromo()">Guardar Promoción</button>
    <button id="btnCancelar" onclick="limpiarFormulario()" style="display:none; background:gray; margin-top:5px;">Cancelar Edición</button>

    <h3>Lista de Promociones</h3>
    <table id="tablaPromos">
        <thead>
            <tr><th>Nombre</th><th>Código</th><th>%</th><th>Acciones</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let idEnEdicion = null; // Nuestra variable "memoria" en lugar del input oculto

    async function cargarPromos() {
        const res = await fetch('/promociones');
        const data = await res.json();
        const tabla = document.querySelector('#tablaPromos tbody');
        
        tabla.innerHTML = data.body.map(p => `
            <tr>
                <td>${p.nombre}</td>
                <td><strong>${p.codigo}</strong></td>
                <td>${p.valor}%</td>
                <td>
                    <button onclick='prepararEdicion(${JSON.stringify(p)})' style="background:#ffc107; color:black; border:none; padding:5px 10px; cursor:pointer; border-radius:4px;">Editar</button>
                    <button onclick="eliminar(${p.id})" style="background:#dc3545; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px;">Eliminar</button>
                </td>
            </tr>
        `).join('');
    }

    function prepararEdicion(p) {
        idEnEdicion = p.id; // Guardamos el ID en la variable
        document.getElementById('nombre').value = p.nombre;
        document.getElementById('codigo').value = p.codigo;
        document.getElementById('valor').value = p.valor;
        
        // Cambiamos la interfaz para que sepa que está editando
        document.getElementById('tituloForm').innerText = "Editando Promoción";
        document.getElementById('btnGuardar').innerText = "Actualizar Cambios";
        document.getElementById('btnCancelar').style.display = "block";
    }

    function limpiarFormulario() {
        idEnEdicion = null;
        document.getElementById('nombre').value = "";
        document.getElementById('codigo').value = "";
        document.getElementById('valor').value = "";
        document.getElementById('tituloForm').innerText = "Nueva Promoción";
        document.getElementById('btnGuardar').innerText = "Guardar Promoción";
        document.getElementById('btnCancelar').style.display = "none";
    }

    async function guardarPromo() {
        const body = {
            nombre: document.getElementById('nombre').value,
            codigo: document.getElementById('codigo').value,
            valor: document.getElementById('valor').value
        };

        if (idEnEdicion) body.id = idEnEdicion; // Si estamos editando, incluimos el ID

        const metodo = idEnEdicion ? 'PUT' : 'POST';

        const res = await fetch('/promociones', {
            method: metodo,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            alert(idEnEdicion ? "Actualizado" : "Guardado");
            limpiarFormulario();
            cargarPromos();
        }
    }

    async function eliminar(id) {
        if(confirm('¿Seguro que quieres eliminar esta promo?')) {
            await fetch('/promociones/' + id, { method: 'DELETE' });
            cargarPromos();
        }
    }

    cargarPromos();
</script>
