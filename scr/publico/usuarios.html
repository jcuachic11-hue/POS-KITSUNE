<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Usuarios - POS Kitsune</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    form { background: #f9f9f9; padding: 20px; border-radius: 8px; max-width: 400px; }
    input { width: 100%; padding: 8px; margin: 5px 0 15px; box-sizing: border-box; }
    button { cursor: pointer; padding: 10px; border: none; border-radius: 4px; }
    .btn-save { background: #28a745; color: white; width: 100%; }
    .btn-edit { background: #ffc107; }
    .btn-delete { background: #dc3545; color: white; }
  </style>
</head>
<body>
  <a href="dashboard.html">⬅ Volver</a>
  <h2>Usuarios Registrados</h2>
  <table id="usuariosTable">
    <thead>
      <tr><th>ID</th><th>Nombre</th><th>Usuario</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h3>Agregar/Editar Usuario</h3>
  <form id="usuarioForm">
    <input type="hidden" id="id">
    <label>Nombre completo:</label>
    <input type="text" id="nombre" required>
    
    <label>Usuario (Login):</label>
    <input type="text" id="usuario" required>
    
    <label>Contraseña:</label>
    <input type="password" id="password" placeholder="Dejar en blanco para no cambiar si editas">
    
    <label>Rol:</label>
    <input type="text" id="rol" placeholder="admin / empleado" required>
    
    <label>Estado (1 Activo, 0 Inactivo):</label>
    <input type="number" id="estado" min="0" max="1" value="1">
    
    <button type="submit" class="btn-save">Guardar Usuario</button>
  </form>

  <script>
    const API_URL = '/usuarios';
    const token = localStorage.getItem('token');

    async function cargarUsuarios() {
      try {
        const res = await fetch(API_URL, { 
          headers: { Authorization: 'Bearer ' + token } 
        });
        const data = await res.json();
        
        // 💡 Ajuste: Acceder a data.body (estándar de tu backend)
        const lista = data.body || [];
        const tbody = document.querySelector('#usuariosTable tbody');
        tbody.innerHTML = '';
        
        lista.forEach(u => {
          tbody.innerHTML += `
            <tr>
              <td>${u.id}</td>
              <td>${u.nombre}</td>
              <td>${u.usuario}</td>
              <td>${u.rol}</td>
              <td>${u.estado == 1 ? 'Activo' : 'Inactivo'}</td>
              <td>
                <button class="btn-edit" onclick="editarUsuario(${u.id}, '${u.nombre}', '${u.usuario}', '${u.rol}', ${u.estado})">Editar</button>
                <button class="btn-delete" onclick="eliminarUsuario(${u.id})">Eliminar</button>
              </td>
            </tr>`;
        });
      } catch (err) {
        console.error("Error cargando usuarios:", err);
      }
    }

    document.getElementById('usuarioForm').addEventListener('submit', async e => {
      e.preventDefault();
      const id = document.getElementById('id').value;
      const datos = {
        nombre: document.getElementById('nombre').value,
        usuario: document.getElementById('usuario').value,
        rol: document.getElementById('rol').value,
        estado: document.getElementById('estado').value
      };
      
      // Solo enviamos password si el usuario escribió algo
      const pass = document.getElementById('password').value;
      if (pass) datos.password = pass;

      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API_URL}/${id}` : API_URL;

      const res = await fetch(url, {
        method,
        headers: { 
          'Content-Type': 'application/json', 
          Authorization: 'Bearer ' + token 
        },
        body: JSON.stringify(datos)
      });

      const result = await res.json();
      if (!result.error) {
        alert("Usuario actualizado");
        document.getElementById('usuarioForm').reset();
        document.getElementById('id').value = '';
        cargarUsuarios();
      } else {
        alert("Error: " + result.body);
      }
    });

    async function eliminarUsuario(id) {
      if (!confirm("¿Eliminar usuario?")) return;
      await fetch(`${API_URL}/${id}`, {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + token }
      });
      cargarUsuarios();
    }

    function editarUsuario(id, nombre, usuario, rol, estado) {
      document.getElementById('id').value = id;
      document.getElementById('nombre').value = nombre;
      document.getElementById('usuario').value = usuario;
      document.getElementById('rol').value = rol;
      document.getElementById('estado').value = estado;
      document.getElementById('password').value = ''; // La contraseña se deja vacía al editar
      document.getElementById('nombre').focus();
    }

    cargarUsuarios();
  </script>
</body>
</html>
