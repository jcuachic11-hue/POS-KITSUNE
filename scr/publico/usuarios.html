<script>
    const API_URL = '/usuarios';
    // El token se queda aquí guardado para cuando lo necesites
    const token = localStorage.getItem('token');

    async function cargarUsuarios() {
        try {
            const res = await fetch(API_URL, {
                headers: {
                    // 'Authorization': 'Bearer ' + token // Descomentar cuando actives JWT
                }
            });
            const data = await res.json();
            const lista = data.body || []; 
            
            const tbody = document.querySelector('#usuariosTable tbody');
            tbody.innerHTML = '';
            
            lista.forEach(u => {
                tbody.innerHTML += `
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.nombre}</td>
                        <td>${u.usuario}</td>
                        <td>${u.rol}</td>
                        <td>${u.estado == 1 ? '✅ Activo' : '❌ Inactivo'}</td>
                        <td>
                            <button class="btn-edit" onclick="prepararEdicion(${u.id}, '${u.nombre}', '${u.usuario}', '${u.rol}', ${u.estado})">Editar</button>
                            <button class="btn-delete" onclick="eliminarUsuario(${u.id})">Eliminar</button>
                        </td>
                    </tr>`;
            });
        } catch (err) {
            console.error("Error:", err);
        }
    }

    document.getElementById('usuarioForm').addEventListener('submit', async e => {
        e.preventDefault();
        const id = document.getElementById('id').value;
        const datos = {
            nombre: document.getElementById('nombre').value,
            usuario: document.getElementById('usuario').value,
            rol: document.getElementById('rol').value,
            estado: parseInt(document.getElementById('estado').value)
        };
        
        const pass = document.getElementById('password').value;
        if (pass) datos.password = pass;

        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        try {
            const res = await fetch(url, {
                method,
                headers: { 
                    'Content-Type': 'application/json',
                    // 'Authorization': 'Bearer ' + token // Descomentar después
                },
                body: JSON.stringify(datos)
            });

            if (res.ok) {
                alert("Operación exitosa");
                limpiarFormulario();
                cargarUsuarios();
            }
        } catch (err) {
            console.error(err);
        }
    });

    async function eliminarUsuario(id) {
        if (!confirm("¿Seguro que deseas eliminar este usuario?")) return;
        try {
            const res = await fetch(`${API_URL}/${id}`, { 
                method: 'DELETE',
                headers: {
                    // 'Authorization': 'Bearer ' + token 
                }
            });
            if (res.ok) cargarUsuarios();
        } catch (err) {
            console.error(err);
        }
    }

    function prepararEdicion(id, nombre, usuario, rol, estado) {
        document.getElementById('id').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('usuario').value = usuario;
        document.getElementById('rol').value = rol;
        document.getElementById('estado').value = estado;
        document.getElementById('password').value = '';
        window.scrollTo(0,0);
    }

    function limpiarFormulario() {
        document.getElementById('usuarioForm').reset();
        document.getElementById('id').value = '';
    }

    window.onload = cargarUsuarios;
</script>
