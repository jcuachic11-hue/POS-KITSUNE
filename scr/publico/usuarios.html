<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - POS Kitsune</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        form { background: white; padding: 20px; border-radius: 8px; max-width: 400px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 8px; margin: 5px 0 15px; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px; border: none; border-radius: 4px; }
        .btn-save { background: #28a745; color: white; width: 100%; font-weight: bold; }
        .btn-edit { background: #ffc107; margin-right: 5px; }
        .btn-delete { background: #dc3545; color: white; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px;">
    <a href="index.html" style="
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        background-color: #34495e;
        color: white;
        padding: 10px 15px;
        border-radius: 6px;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 14px;
        transition: background 0.3s;
    " onmouseover="this.style.backgroundColor='#2c3e50'" 
       onmouseout="this.style.backgroundColor='#34495e'">
        <span style="margin-right: 8px;"></span> Menú Principal
    </a>
</div>
    <a href="dashboard.html" style="text-decoration: none;">⬅ Volver</a>
    <h2>Gestión de Usuarios</h2>
    
    <form id="usuarioForm">
        <input type="hidden" id="id">
        
        <label>Nombre Completo:</label>
        <input type="text" id="nombre" required>
        
        <label>Usuario (Login):</label>
        <input type="text" id="usuario" required>
        
        <label>Contraseña:</label>
        <input type="password" id="password" placeholder="Dejar vacío si no cambia">
        
        <label>Rol:</label>
        <input type="text" id="rol" placeholder="ej: admin / empleado" required>
        
        <label>Estado (1 Activo, 0 Inactivo):</label>
        <input type="number" id="estado" value="1" required>
        
        <button type="submit" class="btn-save">Guardar Usuario</button>
        <button type="button" onclick="limpiarFormulario()" style="width:100%; margin-top:10px; background:#6c757d; color:white">Cancelar / Nuevo</button>
    </form>

    <table id="usuariosTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Usuario</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const API_URL = '/usuarios';

        async function cargarUsuarios() {
            try {
                const res = await fetch(API_URL, { credentials: 'include' });
                
                if (res.status === 403) {
                    window.location.href = "login.html";
                    return;
                }

                const data = await res.json();
                const lista = data.body || [];
                const tbody = document.querySelector('#usuariosTable tbody');
                tbody.innerHTML = '';
                
                lista.forEach(u => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.id}</td>
                            <td>${u.nombre}</td>
                            <td>${u.usuario}</td>
                            <td>${u.rol}</td>
                            <td>${u.estado == 1 ? '✅ Activo' : '❌ Inactivo'}</td>
                            <td>
                                <button class="btn-edit" onclick="prepararEdicion(${u.id}, '${u.nombre}', '${u.usuario}', '${u.rol}', ${u.estado})">Editar</button>
                                <button class="btn-delete" onclick="eliminarUsuario(${u.id})">Borrar</button>
                            </td>
                        </tr>`;
                });
            } catch (e) { console.error("Error cargando tabla:", e); }
        }

        document.getElementById('usuarioForm').addEventListener('submit', async e => {
            e.preventDefault();
            
            const idValue = document.getElementById('id').value;
            const datos = {
                nombre: document.getElementById('nombre').value.trim(),
                usuario: document.getElementById('usuario').value.trim(),
                rol: document.getElementById('rol').value.trim(),
                estado: parseInt(document.getElementById('estado').value)
            };

            if (idValue) datos.id = parseInt(idValue);

            const pass = document.getElementById('password').value;
            if (pass.trim() !== "") datos.password = pass;

            const method = idValue ? 'PUT' : 'POST';
            const url = idValue ? `${API_URL}/${idValue}` : API_URL;

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(datos)
                });
                
                if (res.status === 403) {
                    alert("Sesión expirada o sin permisos");
                    window.location.href = "login.html";
                    return;
                }

                const result = await res.json();

                if(!result.error) {
                    alert(idValue ? "Usuario actualizado" : "Usuario creado");
                    limpiarFormulario();
                    cargarUsuarios();
                } else {
                    alert("Error: " + result.body);
                }
            } catch (err) { 
                console.error("Error en submit:", err);
                alert("Error de conexión");
            }
        });

        function prepararEdicion(id, nombre, usuario, rol, estado) {
            document.getElementById('id').value = id;
            document.getElementById('nombre').value = nombre;
            document.getElementById('usuario').value = usuario;
            document.getElementById('rol').value = rol;
            document.getElementById('estado').value = estado;
            document.getElementById('password').value = ''; 
            window.scrollTo(0,0);
        }

        async function eliminarUsuario(id) {
            if(!confirm("¿Deseas eliminar definitivamente a este usuario?")) return;
            try {
                const res = await fetch(`${API_URL}/${id}`, { 
                    method: 'DELETE',
                    credentials: 'include' 
                });

                if (res.status === 403) {
                    alert("No tienes permiso");
                    return;
                }

                if(res.ok) cargarUsuarios();
            } catch (e) { console.error(e); }
        }

        function limpiarFormulario() {
            document.getElementById('usuarioForm').reset();
            document.getElementById('id').value = '';
        }

        window.onload = cargarUsuarios;
    </script>
</body>
</html>
