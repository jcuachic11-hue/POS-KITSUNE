<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - POS Kitsune</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        form { background: #f9f9f9; padding: 20px; border-radius: 8px; max-width: 400px; }
        input { width: 100%; padding: 8px; margin: 5px 0 15px; box-sizing: border-box; }
        .btn-save { background: #28a745; color: white; width: 100%; cursor: pointer; border: none; padding: 10px; }
    </style>
</head>
<body>
    <a href="dashboard.html">⬅ Volver</a>
    <h2>Gestión de Usuarios</h2>
    
    <form id="usuarioForm">
        <input type="hidden" id="id">
        <label>Nombre:</label>
        <input type="text" id="nombre" required>
        <label>Usuario (Login):</label>
        <input type="text" id="usuario" required>
        <label>Contraseña:</label>
        <input type="password" id="password" placeholder="Solo para cambios">
        <label>Rol:</label>
        <input type="text" id="rol" placeholder="admin / empleado" required>
        <label>Estado (int):</label>
        <input type="number" id="estado" value="1" required>
        <button type="submit" class="btn-save">Guardar Usuario</button>
    </form>

    <table id="usuariosTable">
        <thead>
            <tr><th>ID</th><th>Nombre</th><th>Usuario</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const API_URL = '/usuarios';

        async function cargarUsuarios() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const lista = data.body || [];
                const tbody = document.querySelector('#usuariosTable tbody');
                tbody.innerHTML = '';
                lista.forEach(u => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.id}</td>
                            <td>${u.nombre}</td>
                            <td>${u.usuario}</td>
                            <td>${u.rol}</td>
                            <td>${u.estado}</td>
                            <td>
                                <button onclick="editar('${u.id}','${u.nombre}','${u.usuario}','${u.rol}',${u.estado})">Editar</button>
                                <button onclick="eliminar(${u.id})">Borrar</button>
                            </td>
                        </tr>`;
                });
            } catch (e) { console.error(e); }
        }

        document.getElementById('usuarioForm').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('id').value;
            const datos = {
                nombre: document.getElementById('nombre').value,
                usuario: document.getElementById('usuario').value,
                rol: document.getElementById('rol').value,
                estado: document.getElementById('estado').value
            };
            const pass = document.getElementById('password').value;
            if(pass) datos.password = pass;

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            document.getElementById('usuarioForm').reset();
            document.getElementById('id').value = '';
            cargarUsuarios();
        });

        function editar(id, nombre, usuario, rol, estado) {
            document.getElementById('id').value = id;
            document.getElementById('nombre').value = nombre;
            document.getElementById('usuario').value = usuario;
            document.getElementById('rol').value = rol;
            document.getElementById('estado').value = estado;
        }

        async function eliminar(id) {
            if(!confirm("¿Borrar?")) return;
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            cargarUsuarios();
        }

        window.onload = cargarUsuarios;
    </script>
</body>
</html>
