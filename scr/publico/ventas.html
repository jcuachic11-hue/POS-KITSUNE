<div class="card">
    <h2>Productos a vender</h2>
    <div id="contenedor-filas">
        <div class="fila-producto" style="margin-bottom: 10px;">
            <input type="number" class="idProducto" placeholder="ID Producto" style="width: 100px;">
            <input type="number" class="cantidad" value="1" min="1" style="width: 60px;">
            <span class="precio-unitario" style="color: #28a745; font-weight: bold;"></span>
        </div>
    </div>
    
    <div style="margin-top: 15px;">
        <button onclick="agregarFilaInput()" style="background: #6c757d;">+ Añadir otra fila</button>
        <button onclick="procesarTodasLasFilas()" style="background: #007bff;">Agregar Todo al Carrito</button>
    </div>
</div>

<div class="card">
    <button onclick="listarCarrito()">Ver Carrito (Estado actual)</button>
    <button onclick="verTotales()">Ver Totales</button>
    <button onclick="comprar()" style="background: #28a745;">Finalizar Venta</button>
</div>

<pre id="resultado">Esperando acciones...</pre>

<script>
    // Función para añadir visualmente más campos
    function agregarFilaInput() {
        const div = document.createElement('div');
        div.className = 'fila-producto';
        div.style.marginBottom = "10px";
        div.innerHTML = `
            <input type="number" class="idProducto" placeholder="ID Producto" style="width: 100px;">
            <input type="number" class="cantidad" value="1" min="1" style="width: 60px;">
            <span class="precio-unitario" style="color: #28a745; font-weight: bold;"></span>
        `;
        document.getElementById('contenedor-filas').appendChild(div);
    }

    // Procesa cada fila enviándola al controlador
    async function procesarTodasLasFilas() {
        const filas = document.querySelectorAll('.fila-producto');
        let resultados = [];

        for (let fila of filas) {
            const idProducto = fila.querySelector('.idProducto').value;
            const cantidad = fila.querySelector('.cantidad').value;

            if (idProducto && cantidad) {
                const res = await fetch('/ventas/carrito', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idProducto, cantidad })
                });
                const data = await res.json();
                
                // Mostrar precio en la fila para confirmación visual
                if (data.body && data.body.precio) {
                    fila.querySelector('.precio-unitario').innerText = ` $${data.body.precio}`;
                }
                resultados.push(data);
            }
        }
        
        document.getElementById('resultado').innerText = "Productos procesados:\n" + JSON.stringify(resultados, null, 2);
    }

    // ... (Mantén tus funciones listarCarrito, verTotales y comprar igual que antes)
</script>
